name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      # Pin ruff so lint is reproducible — an unpinned install drifts ahead
      # of the version in the dev deps (uv.lock) and flags files the local
      # toolchain considers clean. Keep this in sync with pyproject's pin.
      - run: pip install ruff==0.15.12
      - run: ruff check .
      - run: ruff format --check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: mypy src/run_site
