name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Single source of truth: CI runs the exact same pre-commit hooks a developer
# runs locally (`uv run pre-commit run --all-files`). Same uv.lock -> same mypy;
# same pinned ruff-pre-commit rev -> same ruff. They cannot drift apart.
jobs:
  pre-commit:
    name: pre-commit (ruff + ruff-format + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies (locked)
        run: uv sync --all-extras

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run the same hooks developers run locally
        run: uv run pre-commit run --all-files --show-diff-on-failure
