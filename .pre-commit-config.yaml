repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.30.0
    hooks:
      - id: django-upgrade
        args: [--target-version, "5.2"]

  # Keep `rev` in lockstep with the ruff range in pyproject.toml [dev].
  # CI runs these same hooks (see .github/workflows/lint.yml), so whatever
  # passes here locally passes CI — and vice versa.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type-checking runs locally too, so a mypy regression is caught before
  # push instead of only in CI. We shell out through `uv run` so the hook
  # finds mypy + the project's dependencies whether it's triggered by the
  # bare git hook (plain PATH) or by `uv run pre-commit` in CI.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (src/run_site)
        entry: uv run mypy src/run_site
        language: system
        pass_filenames: false
        always_run: true
